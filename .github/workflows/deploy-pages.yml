name: Deploy GitHub Pages

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure Pages
        uses: actions/configure-pages@v5

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Prepare Pages artifact
        run: |
          mkdir -p _site
          cp index.html _site/index.html
          cp -R css _site/css
          cp -R js _site/js
          cp -R assets _site/assets

      - name: Validate artifact before upload
        run: |
          set -euo pipefail
          # 必須ファイル
          test -f _site/index.html
          test -f _site/js/main.js
          test -f _site/css/style.css
          # 必須ディレクトリ
          test -d _site/js
          test -d _site/css
          test -d _site/assets
          # 参照整合性チェック（簡易）
          grep -q 'src="js/main.js"' _site/index.html
          echo "Artifact validation passed."
          ls -R _site

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./_site

  deploy:
    runs-on: ubuntu-latest
    needs: build
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
